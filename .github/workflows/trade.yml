name: AEGIS Trade
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Install TWAK CLI
        run: npm install -g @trustwallet/cli
      - name: Restore wallet
        env:
          WALLET_JSON_B64: ${{ secrets.WALLET_JSON_B64 }} 
        run: |
          mkdir -p ~/.twak
          echo "$WALLET_JSON_B64" | base64 -d > ~/.twak/wallet.json
          chmod 600 ~/.twak/wallet.json
      - name: Trade (CMC -> Risk Sentinel -> TWAK)
        env:
          TWAK_ACCESS_ID: ${{ secrets.TWAK_ACCESS_ID }} 
          TWAK_HMAC_SECRET: ${{ secrets.TWAK_HMAC_SECRET }} 
          TWAK_WALLET_PASSWORD: ${{ secrets.TWAK_WALLET_PASSWORD }} 
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }} 
          DELEGATE_PRIVATE_KEY: ${{ secrets.DELEGATE_PRIVATE_KEY }}
          TRADE_TOKEN: USDT
          TRADE_NOTIONAL_BNB: "0.05"
          MIN_TRADE_BNB: "0.005"
        run: PYTHONPATH=. python -m src.chain.trader --live
